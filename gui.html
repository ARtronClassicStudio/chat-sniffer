<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyNet Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background-color: #0a0a0a; }
    .chat-container { scrollbar-width: thin; scrollbar-color: #22c55e #1f1f1f; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; color: white; flex-shrink: 0; }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen flex flex-col">

  <div class="bg-[#111] border-b border-[#222] py-4 px-6 flex items-center gap-3 sticky top-0 z-10">
    <div class="w-10 h-10 bg-green-500 rounded-2xl flex items-center justify-center text-2xl">💬</div>
    <h1 class="text-2xl font-bold">SkyNet Chat</h1>
    <span class="text-xs bg-green-900 text-green-300 px-3 py-1 rounded-full">онлайн</span>
  </div>

  <!-- Спиннер загрузки -->
  <div id="loading" class="hidden flex justify-center items-center py-10">
    <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-green-500"></div>
  </div>

  <div id="chat" class="flex-1 overflow-y-auto chat-container p-6 space-y-8 bg-[#0a0a0a]"></div>

  <script>
    const PROXY = "https://corsproxy.io/?";

    const HEADERS = { /* твои заголовки без изменений */ 
      "Host": "skynetcocu.created.app",
      "Cookie": "ajs_anonymous_id=278ba8d8-07bc-4c7d-9f41-5be40192964d; __Host-authjs.csrf-token=0d4b807ac3f6ab50d2f6080d090647be170b2755efa247f6e39735751d5b18dc%7C548a5d8968d131171a83a4028db875014fa54e9f3605b779e6c4b15cf4ca9b30; __Secure-authjs.callback-url=https%3A%2F%2Fbubuta.created.app",
      "Sec-Ch-Ua-Platform": '"Windows"',
      "Accept-Language": "ru-RU,ru;q=0.9",
      "Sec-Ch-Ua": '"Not-A.Brand";v="24", "Chromium";v="146"',
      "Sec-Ch-Ua-Mobile": "?0",
      "Baggage": "sentry-environment=production,sentry-release=9852d60e76072473fb42d30f8e7bafd1749be0cc,sentry-public_key=91f5667076b3c2ff81a2bf6bf06b4940,sentry-trace_id=e43b6c6459594aab81c1811f894d30cc,sentry-org_id=1154715,sentry-sampled=false,sentry-sample_rand=0.2869467852361859,sentry-sample_rate=0.001",
      "Sentry-Trace": "e43b6c6459594aab81c1811f894d30cc-9efa3185e6e7c419-0",
      "X-Createxyz-Project-Group-Id": "ef36eb1c-c5c6-4602-9b7d-7554ad592394",
      "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/146.0.0.0 Safari/537.36",
      "X-Createxyz-Project-Id": "239669e6-e30f-44d6-9981-86848ed5af32",
      "Accept": "*/*",
      "Sec-Fetch-Site": "same-origin",
      "Sec-Fetch-Mode": "cors",
      "Sec-Fetch-Dest": "empty",
      "Referer": "https://bubuta.created.app/",
      "Priority": "u=1, i"
    };

    function getAvatarColor(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
      const hue = Math.abs(hash) % 360;
      return `hsl(${hue}, 85%, 55%)`;
    }

    async function loadMessages() {
      const loading = document.getElementById("loading");
      const chat = document.getElementById("chat");
      loading.classList.remove("hidden");
      chat.classList.add("opacity-50");

      try {
        const res = await fetch(PROXY + encodeURIComponent("https://skynetcocu.created.app/api/chat/messages"), {
          method: "GET",
          headers: HEADERS
        });

        if (!res.ok) throw new Error();
        const messages = await res.json();
        renderMessages(messages);
      } catch (e) {
        console.error(e);
      } finally {
        loading.classList.add("hidden");
        chat.classList.remove("opacity-50");
      }
    }

    function renderMessages(messages) {
      const chat = document.getElementById("chat");
      chat.innerHTML = "";

      messages.forEach(msg => {
        const isOwn = msg.user_id === 1;
        const nickname = msg.nickname || "Unknown";
        const time = msg.created_at ? new Date(msg.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit', second:'2-digit'}) : '';
        const avatarColor = getAvatarColor(nickname);
        const initial = nickname[0].toUpperCase();

        const html = `
          <div class="flex ${isOwn ? 'justify-end' : 'justify-start'} gap-3">
            ${!isOwn ? `<div class="avatar" style="background-color: ${avatarColor};">${initial}</div>` : ''}
            
            <div class="max-w-[78%]">
              <div class="message-bubble ${isOwn ? 'bg-[#22c55e] text-black rounded-3xl rounded-br-md' : 'bg-[#1f1f1f] rounded-3xl rounded-bl-md'} p-5">
                <div class="flex justify-between text-xs mb-2">
                  <span class="font-bold">${nickname}</span>
                  <span class="opacity-70">${time}</span>
                </div>

                ${msg.media_type === "image" && msg.media_url ? 
                  `<img src="${msg.media_url}" class="rounded-2xl max-w-[320px] mt-2 shadow-2xl">` : ''}

                ${msg.media_type === "video" && msg.media_url ? `
                  <div class="mt-4 flex flex-col items-center">
                    <div class="text-5xl mb-3">🎥</div>
                    <button onclick="window.open('${msg.media_url}', '_blank')" 
                            class="bg-white hover:bg-green-200 text-black px-8 py-4 rounded-3xl font-bold text-lg flex items-center gap-3">
                      <i class="fas fa-play"></i> Воспроизвести видео
                    </button>
                  </div>` : ''}

                ${msg.content ? `<p class="mt-3 text-[15.5px] leading-relaxed">${msg.content}</p>` : ''}
              </div>
            </div>

            ${isOwn ? `<div class="avatar" style="background-color: #22c55e;">${initial}</div>` : ''}
          </div>`;
        chat.innerHTML += html;
      });

      chat.scrollTop = chat.scrollHeight;
    }

    // Запуск
    loadMessages();
    setInterval(loadMessages, 4000);
  </script>
</body>
</html>
